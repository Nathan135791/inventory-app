<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-brand">
                <img src="/images/heartfulness-logo.png" alt="Heartfulness" class="logo">
                <h1>Inventory Manager</h1>
            </div>
            <nav>
                <button class="nav-btn active" data-view="dashboard">Dashboard</button>
                <button class="nav-btn" data-view="additem">Add Item</button>
                <button class="nav-btn" data-view="checkout">Check Out</button>
                <button class="nav-btn" data-view="history">History</button>
            </nav>
        </header>

        <!-- Dashboard View -->
        <section id="dashboard" class="view active">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search items...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <span class="stat-value" id="totalItems">0</span>
                    <span class="stat-label">Total Items</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="totalQuantity">0</span>
                    <span class="stat-label">Total Quantity</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="lowStock">0</span>
                    <span class="stat-label">Low Stock</span>
                </div>
            </div>
            <div class="table-container">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Qty</th>
                            <th>Status</th>
                            <th>With / Purpose</th>
                            <th>Due Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        <!-- Items will be loaded here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Add Item View -->
        <section id="additem" class="view">
            <h2>Add New Item</h2>
            <form id="newItemForm" class="form-card">
                <div class="form-group">
                    <label for="newItemName">Item Name</label>
                    <input type="text" id="newItemName" required placeholder="Enter item name">
                </div>
                <div class="form-group">
                    <label for="newItemQty">Quantity</label>
                    <input type="number" id="newItemQty" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label for="newItemNotes">Notes (optional)</label>
                    <textarea id="newItemNotes" rows="3" placeholder="Description, location, etc."></textarea>
                </div>
                <button type="submit" class="btn-primary">Add Item</button>
            </form>
        </section>

        <!-- Check-Out View -->
        <section id="checkout" class="view">
            <h2>Check Out Items</h2>
            <form id="checkoutForm" class="form-card">
                <div class="form-group">
                    <label for="checkoutItemSelect">Select Item</label>
                    <select id="checkoutItemSelect" required>
                        <option value="">-- Select Item --</option>
                    </select>
                </div>
                <div class="item-info hidden" id="checkoutItemInfo">
                    <span>Available: <strong id="availableQty">0</strong></span>
                </div>
                <div class="form-group">
                    <label for="borrowedBy">Borrowed By (Name)</label>
                    <input type="text" id="borrowedBy" required placeholder="Who is borrowing this?">
                </div>
                <div class="form-group">
                    <label for="purpose">Purpose</label>
                    <input type="text" id="purpose" placeholder="What for?">
                </div>
                <div class="form-group">
                    <label for="duration">Duration</label>
                    <select id="duration">
                        <option value="1 day">1 Day</option>
                        <option value="2 days">2 Days</option>
                        <option value="3 days">3 Days</option>
                        <option value="1 week" selected>1 Week</option>
                        <option value="2 weeks">2 Weeks</option>
                        <option value="1 month">1 Month</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="checkoutQty">Quantity</label>
                    <input type="number" id="checkoutQty" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label for="checkoutNotes">Notes (optional)</label>
                    <textarea id="checkoutNotes" rows="2" placeholder="Additional notes..."></textarea>
                </div>
                <button type="submit" class="btn-danger">Check Out</button>
            </form>

            <h2 style="margin-top: 30px;">Return Items</h2>
            <form id="returnForm" class="form-card">
                <div class="form-group">
                    <label for="returnItemSelect">Select Item to Return</label>
                    <select id="returnItemSelect" required>
                        <option value="">-- Select Checked Out Item --</option>
                    </select>
                </div>
                <div class="item-info hidden" id="returnItemInfo">
                    <p><strong>Borrowed by:</strong> <span id="returnBorrowedBy">-</span></p>
                    <p><strong>Purpose:</strong> <span id="returnPurpose">-</span></p>
                    <p><strong>Checked out:</strong> <span id="returnCheckedOutAt">-</span></p>
                </div>
                <div class="form-group">
                    <label for="returnNotes">Return Notes (optional)</label>
                    <textarea id="returnNotes" rows="2" placeholder="Any notes about the return..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Mark as Returned</button>
            </form>
        </section>

        <!-- History View -->
        <section id="history" class="view">
            <h2>Transaction History</h2>
            <div class="table-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Item</th>
                            <th>Type</th>
                            <th>By</th>
                            <th>Purpose</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- Transactions will be loaded here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Toast Notification -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
